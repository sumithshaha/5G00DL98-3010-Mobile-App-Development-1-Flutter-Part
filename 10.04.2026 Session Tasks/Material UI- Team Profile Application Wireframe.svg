<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 760" font-family="-apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <pattern id="dots" width="6" height="6" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.7" fill="#9aa5b1"/>
    </pattern>
    <filter id="phoneShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Page background -->
  <rect width="900" height="760" fill="#f4f6fa"/>

  <!-- Title -->
  <text x="40" y="48" font-size="22" font-weight="700" fill="#1f2933">Team Profile App — Wireframe (Material UI 3)</text>
  <text x="40" y="72" font-size="13" fill="#4b5563">One screen, vertical Column, Card-based layout. Annotations on the right map sketched regions to Material widgets.</text>

  <!-- ============== PHONE FRAME ============== -->
  <g transform="translate(60,100)" filter="url(#phoneShadow)">
    <!-- Phone outer body -->
    <rect x="0" y="0" width="360" height="640" rx="36" ry="36" fill="#1f2933"/>
    <!-- Screen -->
    <rect x="10" y="14" width="340" height="612" rx="26" ry="26" fill="#ffffff"/>
    <!-- Notch -->
    <rect x="140" y="22" width="80" height="14" rx="7" fill="#1f2933"/>

    <!-- Status bar area placeholder -->
    <rect x="20" y="46" width="320" height="6" fill="url(#dots)"/>

    <!-- AppBar -->
    <rect x="20" y="58" width="320" height="56" rx="6" fill="#e8def8" stroke="#65558f" stroke-width="1"/>
    <text x="36" y="92" font-size="16" font-weight="600" fill="#1d192b">Team Profile</text>
    <!-- AppBar trailing icon -->
    <circle cx="320" cy="86" r="11" fill="none" stroke="#65558f" stroke-width="1.5"/>
    <text x="316" y="90" font-size="11" fill="#65558f">i</text>

    <!-- Team header section -->
    <rect x="20" y="124" width="320" height="76" rx="12" fill="#f3edf7"/>
    <text x="34" y="148" font-size="14" font-weight="700" fill="#1d192b">Team Aurora</text>
    <text x="34" y="166" font-size="11" fill="#49454f">A small cross-border crew building cross-</text>
    <text x="34" y="180" font-size="11" fill="#49454f">platform apps from Tampere &amp; Würzburg.</text>
    <!-- members count chip -->
    <rect x="270" y="138" width="56" height="22" rx="11" fill="#65558f"/>
    <text x="282" y="153" font-size="11" font-weight="600" fill="#fff">3 members</text>

    <!-- Indicator dots (which member is shown) -->
    <g transform="translate(160,212)">
      <circle cx="0" cy="0" r="4" fill="#65558f"/>
      <circle cx="14" cy="0" r="4" fill="#cac4d0"/>
      <circle cx="28" cy="0" r="4" fill="#cac4d0"/>
    </g>

    <!-- Member CARD -->
    <rect x="20" y="228" width="320" height="320" rx="14" fill="#fffbfe" stroke="#cac4d0" stroke-width="1"/>

    <!-- Member image -->
    <rect x="40" y="248" width="280" height="150" rx="10" fill="#eaddff"/>
    <line x1="40" y1="248" x2="320" y2="398" stroke="#cac4d0" stroke-width="1"/>
    <line x1="320" y1="248" x2="40" y2="398" stroke="#cac4d0" stroke-width="1"/>
    <text x="142" y="328" font-size="12" fill="#49454f">[ member photo ]</text>

    <!-- Name -->
    <text x="40" y="424" font-size="16" font-weight="700" fill="#1d192b">Sumith Shaha</text>
    <!-- Role chip -->
    <rect x="40" y="438" width="140" height="22" rx="11" fill="#e8def8"/>
    <text x="52" y="453" font-size="11" font-weight="600" fill="#65558f">Mobile / Backend</text>
    <!-- Country line with icon placeholder -->
    <circle cx="50" cy="478" r="6" fill="none" stroke="#49454f" stroke-width="1.2"/>
    <text x="64" y="482" font-size="11" fill="#49454f">Bangladesh → Finland</text>
    <!-- Short intro -->
    <text x="40" y="504" font-size="11" fill="#49454f">Final-year SE student at TAMK. Loves</text>
    <text x="40" y="518" font-size="11" fill="#49454f">Flutter, Riverpod, and quiet mornings.</text>
    <!-- Motto -->
    <text x="40" y="540" font-size="11" font-style="italic" fill="#7d5260">“Ship small, ship often.”</text>

    <!-- Navigation row (prev / next) -->
    <g>
      <!-- prev -->
      <circle cx="60" cy="586" r="22" fill="#e8def8"/>
      <path d="M68 586 L54 586 M60 580 L52 586 L60 592" stroke="#65558f" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- next -->
      <circle cx="300" cy="586" r="22" fill="#65558f"/>
      <path d="M292 586 L306 586 M300 580 L308 586 L300 592" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- swipe hint -->
      <text x="120" y="582" font-size="10" fill="#79747e">swipe ←  or use arrows  →</text>
      <text x="120" y="596" font-size="10" fill="#79747e">to switch members</text>
    </g>
  </g>

  <!-- ============== ANNOTATIONS ============== -->
  <g transform="translate(470,100)" font-size="12" fill="#1f2933">
    <text x="0" y="0" font-size="16" font-weight="700">Region → Material Widget mapping</text>

    <!-- Row helper -->
    <g transform="translate(0,24)">
      <rect x="0" y="0" width="380" height="60" rx="8" fill="#fff" stroke="#d1d5db"/>
      <text x="12" y="20" font-weight="700">① App bar</text>
      <text x="12" y="38" fill="#4b5563">Scaffold.appBar = AppBar( title: Text('Team Profile') )</text>
      <text x="12" y="54" fill="#4b5563">Trailing IconButton for an "About" sheet (showModalBottomSheet).</text>
    </g>

    <g transform="translate(0,94)">
      <rect x="0" y="0" width="380" height="60" rx="8" fill="#fff" stroke="#d1d5db"/>
      <text x="12" y="20" font-weight="700">② Team header card</text>
      <text x="12" y="38" fill="#4b5563">Card → Padding → Column [ Text(name, headlineSmall),</text>
      <text x="12" y="54" fill="#4b5563">Text(description, bodyMedium), Chip("3 members") ]</text>
    </g>

    <g transform="translate(0,164)">
      <rect x="0" y="0" width="380" height="60" rx="8" fill="#fff" stroke="#d1d5db"/>
      <text x="12" y="20" font-weight="700">③ Page indicator</text>
      <text x="12" y="38" fill="#4b5563">Row of small dots (Container+BoxDecoration circles)</text>
      <text x="12" y="54" fill="#4b5563">or smooth_page_indicator package — driven by PageController.</text>
    </g>

    <g transform="translate(0,234)">
      <rect x="0" y="0" width="380" height="146" rx="8" fill="#fff" stroke="#d1d5db"/>
      <text x="12" y="20" font-weight="700">④ Member card (one visible at a time)</text>
      <text x="12" y="40" fill="#4b5563">PageView.builder swipes between members.</text>
      <text x="12" y="56" fill="#4b5563">Each page = Card → Column:</text>
      <text x="24" y="74" fill="#4b5563">• ClipRRect( Image.asset(...) ) — photo with rounded corners</text>
      <text x="24" y="90" fill="#4b5563">• Text(name, titleLarge)</text>
      <text x="24" y="106" fill="#4b5563">• Chip(role)  +  Row[ Icon(flag), Text(country) ]</text>
      <text x="24" y="122" fill="#4b5563">• Text(intro, bodyMedium)</text>
      <text x="24" y="138" fill="#4b5563">• Text(motto, italic, bodySmall) — under a Divider</text>
    </g>

    <g transform="translate(0,390)">
      <rect x="0" y="0" width="380" height="78" rx="8" fill="#fff" stroke="#d1d5db"/>
      <text x="12" y="20" font-weight="700">⑤ Prev / Next navigation</text>
      <text x="12" y="38" fill="#4b5563">Row [ IconButton(arrow_back),  Text("swipe..."),</text>
      <text x="12" y="54" fill="#4b5563">FloatingActionButton.small(arrow_forward) ]</text>
      <text x="12" y="72" fill="#4b5563">Both call PageController.previousPage / nextPage with curve.</text>
    </g>

    <g transform="translate(0,478)">
      <rect x="0" y="0" width="380" height="118" rx="8" fill="#f3edf7" stroke="#65558f"/>
      <text x="12" y="20" font-weight="700" fill="#1d192b">Layout backbone</text>
      <text x="12" y="40" fill="#1d192b">SafeArea → SingleChildScrollView → Padding(16) → Column</text>
      <text x="12" y="56" fill="#1d192b">with SizedBox(height: 12) as breathing room between sections.</text>
      <text x="12" y="76" fill="#1d192b">Theme: ThemeData(useMaterial3: true,</text>
      <text x="12" y="92" fill="#1d192b">colorScheme: ColorScheme.fromSeed(seed: deepPurple))</text>
      <text x="12" y="110" fill="#1d192b">→ gives the M3 surface tints used in this sketch.</text>
    </g>

    <g transform="translate(0,606)">
      <rect x="0" y="0" width="380" height="44" rx="8" fill="#fff8e1" stroke="#f59e0b"/>
      <text x="12" y="20" font-weight="700" fill="#92400e">iOS variant (optional)</text>
      <text x="12" y="38" fill="#78350f">Detect Theme.of(context).platform == TargetPlatform.iOS</text>
    </g>
  </g>
</svg>
