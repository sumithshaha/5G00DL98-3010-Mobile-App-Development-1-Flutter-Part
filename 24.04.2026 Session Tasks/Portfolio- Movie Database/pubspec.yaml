name: movie_db
description: "Unit 7 Portfolio — Movie Database App. HTTP fetch + SQLite cache + search + details screen + tests."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  http: ^1.2.0
  sqflite: ^2.4.0
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # For testing the HTTP repository without hitting the real network.
  http: ^1.2.0
  # In-memory database factory used by sqflite tests.
  sqflite_common_ffi: ^2.3.3

flutter:
  uses-material-design: true
